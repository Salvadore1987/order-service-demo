spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:h2:mem:processtestdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

process-engine:
  worker:
    engine-url: http://localhost:8080
    rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest
    auto-deploy:
      enabled: true
    auth:
      enabled: true
      token-uri: http://localhost:8180/realms/process-engine/protocol/openid-connect/token
      client-id: ${KEYCLOAK_CLIENT_ID:order-service}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:oP2A7vmcOqTV4maHQeNfhBdc2ku780kH}
